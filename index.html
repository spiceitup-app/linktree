<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spice it up!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="linktree" aria-label="Spice it up Download Links">
    <section class="content">
      <div class="logo-wrap">
        <!-- Eigenes rundes Bild hier einfügen, zum Beispiel: src="assets/logo.png" -->
        <img class="logo" src="assets/logo.png" alt="Spice it up Logo" />
      </div>

      <h1>Download Spice it up! kostenlos:</h1>

      <nav class="store-links" aria-label="App Download Links">
        <a class="store-button" href="#" target="_blank" rel="noopener noreferrer" aria-label="Spice it up! im Apple App Store herunterladen">
          <!-- Apple Icon hier einfügen, zum Beispiel: src="assets/apple-icon.png" -->
          <img class="store-icon" src="assets/apple-icon.png" alt="" />
          <span>Apple<br>App Store</span>
        </a>

        <a class="store-button" href="#" target="_blank" rel="noopener noreferrer" aria-label="Spice it up! im Google Play Store herunterladen">
          <!-- Google Icon hier einfügen, zum Beispiel: src="assets/google-icon.png" -->
          <img class="store-icon" src="assets/google-icon.png" alt="" />
          <span>Google<br>Play Store</span>
        </a>
      </nav>
    </section>

    <footer>
      <a href="https://spiceitup-app.github.io/#impressum" target="_blank" rel="noopener noreferrer">Impressum</a>
    </footer>
  </main>
</body>
</html>
