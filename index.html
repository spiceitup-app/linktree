<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spice it up! Linktree</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="assets/favicon/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png">
<link rel="apple-touch-icon" href="assets/favicon/apple-touch-icon.png">
<link rel="manifest" href="assets/favicon/site.webmanifest">
</head>
<body>
  <main class="linktree" aria-label="Spice it up Download Links">
    <section class="content">
      <div class="logo-wrap">
        <!-- Eigenes Bild hier einfügen, zum Beispiel: src="assets/logo.png" -->
        <img class="logo" src="assets/logo.png" alt="Spice it up Logo" />
      </div>

      <h1>
  <span class="title-normal">Download </span>
  <span class="title-bold">Spice it up!</span>
  <span class="title-normal"> kostenlos</span>
</h1>

      <nav class="store-links" aria-label="App Download Links">
        <a class="store-button" href="#" target="_blank" rel="noopener noreferrer" aria-label="Spice it up! im Apple App Store herunterladen">
          <!-- Apple Icon hier einfügen, zum Beispiel: src="assets/apple-icon.png" -->
          <img class="store-icon" src="assets/apple-icon.png" alt="" />
          <span>Apple<br>App Store</span>
        </a>

        <a class="store-button" href="#" target="_blank" rel="noopener noreferrer" aria-label="Spice it up! im Google Play Store herunterladen">
          <!-- Google Icon hier einfügen, zum Beispiel: src="assets/google-icon.png" -->
          <img class="store-icon" src="assets/google-icon.png" alt="" />
          <span>Google<br>Play Store</span>
        </a>
      </nav>


      <nav class="social-icon-links" aria-label="Social Media Links">
        <a class="social-icon-link" href="https://www.tiktok.com/@spiceitup.app" target="_blank" rel="noopener noreferrer" aria-label="Spice it up! auf TikTok ansehen">
          <!-- TikTok Icon hier einfügen. Aktuell ist Apple als Platzhalter gesetzt. -->
          <img class="social-icon" src="assets/tiktok-icon.svg" alt="" />
          <span>TikTok</span>
        </a>

        <a class="social-icon-link" href="https://www.instagram.com/spiceitup.app" target="_blank" rel="noopener noreferrer" aria-label="Spice it up! auf Instagram ansehen">
          <!-- Instagram Icon hier einfügen. Aktuell ist Apple als Platzhalter gesetzt. -->
          <img class="social-icon" src="assets/instagram-icon.svg" alt="" />
          <span>Instagram</span>
        </a>

        <a class="social-icon-link" href="https://youtube.com/@spiceitup-app" target="_blank" rel="noopener noreferrer" aria-label="Spice it up! auf YouTube ansehen">
          <!-- YouTube Icon hier einfügen. Aktuell ist Apple als Platzhalter gesetzt. -->
          <img class="social-icon" src="assets/youtube-icon.svg" alt="" />
          <span>YouTube</span>
        </a>

        <a class="social-icon-link" href="https://www.threads.com/@spiceitup.app" target="_blank" rel="noopener noreferrer" aria-label="Spice it up! auf Threads ansehen">
          <!-- Threads Icon hier einfügen. -->
          <img class="social-icon" src="assets/threads-icon.svg" alt="" />
          <span>Threads</span>
        </a>

        <a class="social-icon-link" href="https://www.linkedin.com/company/spiceitup-app" target="_blank" rel="noopener noreferrer" aria-label="Spice it up! auf Linkedin ansehen">
          <!-- Threads Icon hier einfügen. -->
          <img class="social-icon" src="assets/linkedin-icon.svg" alt="" />
          <span>Linkedin</span>
        </a>

        <a class="social-icon-link" href="https://de.pinterest.com/spiceitupapp" target="_blank" rel="noopener noreferrer" aria-label="Spice it up! auf Pinterest ansehen">
          <!-- Threads Icon hier einfügen. -->
          <img class="social-icon" src="assets/pinterest-icon.svg" alt="" />
          <span>Pinterest</span>
        </a>

        <!--
          Weitere Social-Media-Accounts einfach als kompletten Block kopieren
          und darunter einfügen. Das Grid setzt automatisch immer 4 Accounts
          in eine Reihe. Der 5. Account beginnt also die zweite Reihe,
          der 9. Account die dritte Reihe.

          Beispiel:
          <a class="social-icon-link" href="DEIN_LINK" target="_blank" rel="noopener noreferrer" aria-label="Spice it up! auf KANAL ansehen">
            <img class="social-icon" src="assets/DEIN_ICON.svg" alt="" />
            <span>KANAL</span>
          </a>
        -->
      </nav>

    </section>

    <footer>
      <a href="https://spiceitup-app.github.io/#impressum" target="_blank" rel="noopener noreferrer">Impressum</a>
    </footer>
  </main>
</body>
</html>
